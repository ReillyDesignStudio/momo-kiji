# ReadTheDocs Configuration
# https://docs.readthedocs.io/en/stable/config-file/v2/

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

python:
  version: "3.11"
  install:
    - requirements: requirements.txt
    - method: pip
      path: .

sphinx:
  configuration: docs/conf.py
  builder: html

formats:
  - pdf
  - epub

# Tell ReadTheDocs where to find the docs
doc_path: docs

# Fail the build if there are warnings
fail_on_warning: false

# Enable PDF builds
pdf:
  enabled: true
